name: go-microservice-test

services:
  service:
    build:
      context: ../..
      dockerfile: examples/microservice/Dockerfile
    hostname: "service"
    container_name: "service"
    networks:
      - go-microservice-test
    environment:
      - DB_TYPE=1
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=test
      - DB_PASSWORD=test
      - DB_NAME=test
      - CACHE_HOST=cache
      - CACHE_PORT=6379
      - BUS_HOST=bus
      - BUS_PORT=5672
      - BUS_USER=guest
      - BUS_PASSWORD=guest
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://service:8080/_status"]
      interval: 30s
      timeout: 3s
      retries: 10
      start_period: 2s
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      bus:
        condition: service_healthy

  db:
    image: "postgres:17-alpine"
    hostname: "db"
    container_name: "db"
    networks:
      - go-microservice-test
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: "test"
      POSTGRES_PASSWORD: "test"
      POSTGRES_DB: "test"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d test"]
      interval: 5s
      timeout: 3s
      retries: 10

  cache:
    image: "redis:alpine"
    hostname: "cache"
    container_name: "cache"
    networks:
      - go-microservice-test
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    environment:
      - ALLOW_EMPTY_PASSWORD=yes

  bus:
    image: "rabbitmq:4-alpine"
    hostname: "bus"
    container_name: "bus"
    networks:
      - go-microservice-test
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

networks:
  go-microservice-test:
    name: go-microservice-test