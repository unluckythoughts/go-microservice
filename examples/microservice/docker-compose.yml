name: go-microservice-test

services:
  service:
    build:
      context: ../..
      dockerfile: examples/microservice/Dockerfile
    hostname: "service"
    container_name: "service"
    networks:
      - go-microservice-test
    environment:
      - DB_TYPE=1
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=test
      - DB_PASSWORD=test
      - DB_NAME=test
      - CACHE_HOST=cache
      - CACHE_PORT=6379
      - BUS_HOST=kafka
      - BUS_PORT=9092
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://service:8080/_status"]
      interval: 30s
      timeout: 3s
      retries: 10
      start_period: 2s
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      bus:
        condition: service_healthy
      kafka:
        condition: service_healthy

  db:
    image: "postgres:17-alpine"
    hostname: "db"
    container_name: "db"
    networks:
      - go-microservice-test
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: "test"
      POSTGRES_PASSWORD: "test"
      POSTGRES_DB: "test"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d test"]
      interval: 5s
      timeout: 3s
      retries: 10

  cache:
    image: "redis:alpine"
    hostname: "cache"
    container_name: "cache"
    networks:
      - go-microservice-test
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    environment:
      - ALLOW_EMPTY_PASSWORD=yes

  bus:
    image: "rabbitmq:4-alpine"
    hostname: "bus"
    container_name: "bus"
    networks:
      - go-microservice-test
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 5s
      timeout: 3s
      retries: 10
  kafka:
    image: "apache/kafka:4.1.2"
    hostname: "kafka"
    container_name: "kafka"
    networks:
      - go-microservice-test
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list > /dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

networks:
  go-microservice-test:
    name: go-microservice-test