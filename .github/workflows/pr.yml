name: PR Checks
on:
  pull_request:
    types: ["opened", "edited", "reopened", "synchronize"]
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Install make
        run: apk add --no-cache make
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up services
        run: make run
      - name: Wait for services to be healthy (5s)
        run: sleep 5
      - name: Run tests with race detection
        run: make test-ci
      